<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>scuba 🤿🐱</title>
<style>
  :root {
    --bg: #050505;
    --glow: #ff6ec7;
    --glow2: #6ee7ff;
    --glow3: #ffe066;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    overflow-x: hidden;
    min-height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    position: relative;
    min-height: 100vh;
    display: block;
    padding: 40px 16px 100px;
  }

  /* sticker layer */
  #stickers {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }

  .sticker {
    position: absolute;
    user-select: none;
    will-change: transform;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.15));
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(var(--r, 0deg)); }
    50% { transform: translateY(-18px) rotate(var(--r, 0deg)); }
  }

  @media (prefers-reduced-motion: reduce) {
    .sticker { animation: none; }
  }

  /* content layer */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
  }

  h1 {
    color: #fff;
    font-size: clamp(28px, 6vw, 48px);
    margin: 10px 0 4px;
    text-shadow:
      0 0 12px var(--glow),
      0 0 28px var(--glow2);
    letter-spacing: 0.5px;
  }

  .subtitle {
    color: #ddd;
    font-size: clamp(14px, 2.5vw, 18px);
    margin-bottom: 28px;
    opacity: 0.85;
  }

  .video-frame {
    position: relative;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    aspect-ratio: 9 / 16;
    border-radius: 18px;
    overflow: hidden;
    border: 3px solid #ffffff22;
    box-shadow:
      0 0 0 4px #000,
      0 0 30px var(--glow),
      0 0 60px var(--glow2);
    background: #000;
  }

  .video-frame iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }

  .caption {
    margin-top: 22px;
    color: #fff;
    font-size: clamp(13px, 2vw, 15px);
    opacity: 0.7;
  }

  .caption a {
    color: var(--glow2);
  }

  .divider {
    margin: 70px auto 50px;
    font-size: clamp(18px, 4vw, 26px);
    letter-spacing: 14px;
    opacity: 0.6;
  }

  .section-title {
    color: #fff;
    font-size: clamp(20px, 4vw, 30px);
    margin: 0 0 8px;
    text-shadow: 0 0 14px var(--glow3);
  }

  .section-sub {
    color: #ccc;
    font-size: clamp(13px, 2vw, 16px);
    opacity: 0.8;
    margin: 0 0 30px;
  }

  .sticker-wall {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 14px;
    max-width: 620px;
    margin: 0 auto 60px;
  }

  .sticker-tile {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(22px, 5vw, 34px);
    background: #ffffff0a;
    border: 1px solid #ffffff1a;
    border-radius: 16px;
    backdrop-filter: blur(2px);
    transition: transform 0.2s ease;
  }

  .sticker-tile:hover {
    transform: scale(1.12) rotate(-4deg);
  }

  .quote-block {
    margin: 10px auto 60px;
    max-width: 480px;
    color: #fff;
    font-size: clamp(16px, 3vw, 22px);
    line-height: 1.6;
    opacity: 0.9;
  }

  .quote-block span {
    display: block;
    font-size: clamp(12px, 2vw, 14px);
    color: #aaa;
    margin-top: 10px;
  }

  .footer {
    margin-top: 40px;
    color: #999;
    font-size: 13px;
    opacity: 0.6;
  }
</style>
</head>
<body>

  <!-- floating cute stickers, scattered across the page -->
  <div id="stickers"></div>

  <div class="content">
    <h1>scuba cat 🤿✨</h1>
    <p class="subtitle"> 🕺🐈</p>

    <div class="video-frame">
      <!-- Embedded via YouTube's official embed player -->
      <iframe
        src="https://www.youtube.com/embed/Y7WqiO-PNZA?rel=0&loop=1&playlist=Y7WqiO-PNZA"
        title="Scuba Cat Dance"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>

    <p class="caption">🐾 made with cuteness and chaos 🐾</p>

    <div class="divider">✨ 🐾 ✨ 🐾 ✨</div>

    <h2 class="section-title">the official sticker wall</h2>
    <p class="section-sub">tap one, it wiggles 🫧</p>
    <div class="sticker-wall" id="stickerWall"></div>

    <div class="quote-block">
      "it stank." 🐈‍⬛💧
      <span>— scuba cat, probably</span>
    </div>

    <div class="divider">🌸 💖 🌸 💖 🌸</div>

    <p class="footer">wesbite by aashu chaudhary🤿</p>
  </div>

<script>
  // a fun bag of cute sticker emojis
  const stickerEmojis = [
    "🐱","🐾","💖","✨","🌸","🐠","🫧","⭐","🦋","🍓",
    "🐰","☁️","🌈","💫","🐈","🧋","🍡","🪼","🐟","🎀",
    "🐹","🍥","🥥","🐳","🐬","🌟","🍒","🌺","🐥","💗",
    "🦄","🍩","🐢","🍉","🦢","🍭","🐞","🌙","🍑","🐧",
    "🦊","🍪","🐙","🌻","🐝","🍨","🐶","🪺","🐌","💐"
  ];

  // floating background stickers — spread across the *entire* scrollable page
  function scatterFloatingStickers() {
    const container = document.getElementById('stickers');
    container.innerHTML = '';
    const pageHeight = document.documentElement.scrollHeight;
    const stickerCount = 70;

    for (let i = 0; i < stickerCount; i++) {
      const el = document.createElement('div');
      el.className = 'sticker';
      el.textContent = stickerEmojis[Math.floor(Math.random() * stickerEmojis.length)];

      const top = Math.random() * pageHeight;        // px, across full page
      const left = Math.random() * 100;               // vw %
      const size = 16 + Math.random() * 30;            // px
      const rot = (Math.random() * 60 - 30).toFixed(1) + 'deg';
      const dur = (4 + Math.random() * 5).toFixed(2) + 's';
      const delay = (Math.random() * 5).toFixed(2) + 's';
      const opacity = 0.5 + Math.random() * 0.45;

      el.style.top = top + 'px';
      el.style.left = left + 'vw';
      el.style.fontSize = size + 'px';
      el.style.setProperty('--r', rot);
      el.style.animationDuration = dur;
      el.style.animationDelay = delay;
      el.style.opacity = opacity;

      container.appendChild(el);
    }
  }

  // interactive sticker wall grid
  function buildStickerWall() {
    const wall = document.getElementById('stickerWall');
    const wallCount = 24;
    for (let i = 0; i < wallCount; i++) {
      const tile = document.createElement('div');
      tile.className = 'sticker-tile';
      tile.textContent = stickerEmojis[Math.floor(Math.random() * stickerEmojis.length)];
      tile.addEventListener('click', () => {
        tile.textContent = stickerEmojis[Math.floor(Math.random() * stickerEmojis.length)];
      });
      wall.appendChild(tile);
    }
  }

  buildStickerWall();
  // wait a tick so layout (including the wall + video) is in the DOM
  // before measuring full page height for floating stickers
  window.addEventListener('load', scatterFloatingStickers);
  // also run immediately in case load already fired
  scatterFloatingStickers();
</script>

</body>
</html>
