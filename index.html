<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>scuba 🤿🐱</title>
<style>
  :root {
    --bg: #050505;
    --glow: #ff6ec7;
    --glow2: #6ee7ff;
    --glow3: #ffe066;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    overflow-x: hidden;
    min-height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    position: relative;
    min-height: 100vh;
    display: block;
    padding: 40px 16px 100px;
  }

  /* sticker layer */
  #stickers {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }

  .sticker {
    position: absolute;
    user-select: none;
    will-change: transform;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.15));
    animation: float 6s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px) rotate(var(--r, 0deg)); }
    50% { transform: translateY(-18px) rotate(var(--r, 0deg)); }
  }

  @media (prefers-reduced-motion: reduce) {
    .sticker { animation: none; }
  }

  /* content layer */
  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
  }

  h1 {
    color: #fff;
    font-size: clamp(28px, 6vw, 48px);
    margin: 10px 0 4px;
    text-shadow:
      0 0 12px var(--glow),
      0 0 28px var(--glow2);
    letter-spacing: 0.5px;
  }

  .subtitle {
    color: #ddd;
    font-size: clamp(14px, 2.5vw, 18px);
    margin-bottom: 28px;
    opacity: 0.85;
  }

  .caption {
    margin-top: 22px;
    color: #fff;
    font-size: clamp(13px, 2vw, 15px);
    opacity: 0.7;
  }

  .caption a {
    color: var(--glow2);
  }

  .divider {
    margin: 70px auto 50px;
    font-size: clamp(18px, 4vw, 26px);
    letter-spacing: 14px;
    opacity: 0.6;
  }

  .section-title {
    color: #fff;
    font-size: clamp(20px, 4vw, 30px);
    margin: 0 0 8px;
    text-shadow: 0 0 14px var(--glow3);
  }

  .section-sub {
    color: #ccc;
    font-size: clamp(13px, 2vw, 16px);
    opacity: 0.8;
    margin: 0 0 30px;
  }

  .sticker-wall {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
    gap: 14px;
    max-width: 620px;
    margin: 0 auto 60px;
  }

  .sticker-tile {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(22px, 5vw, 34px);
    background: #ffffff0a;
    border: 1px solid #ffffff1a;
    border-radius: 16px;
    backdrop-filter: blur(2px);
    transition: transform 0.2s ease;
  }

  .sticker-tile:hover {
    transform: scale(1.12) rotate(-4deg);
  }

  .quote-block {
    margin: 10px auto 60px;
    max-width: 480px;
    color: #fff;
    font-size: clamp(16px, 3vw, 22px);
    line-height: 1.6;
    opacity: 0.9;
  }

  .quote-block span {
    display: block;
    font-size: clamp(12px, 2vw, 14px);
    color: #aaa;
    margin-top: 10px;
  }

  .footer {
    margin-top: 40px;
    color: #999;
    font-size: 13px;
    opacity: 0.6;
  }

  /* ---------- Tic Tac Toe ---------- */
  .game-wrap {
    max-width: 380px;
    margin: 0 auto 20px;
  }

  .game-status {
    color: #fff;
    font-size: clamp(15px, 3vw, 19px);
    margin-bottom: 18px;
    min-height: 28px;
    text-shadow: 0 0 10px var(--glow2);
  }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
  }

  .cell {
    aspect-ratio: 1 / 1;
    background: #ffffff0d;
    border: 2px solid #ffffff22;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(28px, 8vw, 44px);
    cursor: pointer;
    color: #fff;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
  }

  .cell:hover:not(.taken) {
    background: #ffffff1a;
    border-color: var(--glow2);
    transform: scale(1.04);
  }

  .cell.taken {
    cursor: default;
  }

  .cell.win {
    border-color: var(--glow3);
    box-shadow: 0 0 18px var(--glow3);
  }

  .game-controls {
    margin-top: 20px;
  }

  .game-btn {
    background: #ffffff12;
    border: 1px solid #ffffff33;
    color: #fff;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.15s ease;
  }

  .game-btn:hover {
    background: #ffffff22;
    transform: scale(1.04);
  }

  /* celebration overlay */
  .celebration {
    display: none;
    margin: 26px auto 0;
    max-width: 320px;
    padding: 22px 18px;
    border-radius: 20px;
    background: #ffffff0d;
    border: 2px solid var(--glow3);
    box-shadow: 0 0 30px var(--glow3);
  }

  .celebration.show {
    display: block;
    animation: pop-in 0.35s ease;
  }

  @keyframes pop-in {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .dancer {
    font-size: 64px;
    display: inline-block;
    animation: dance 0.55s ease-in-out infinite;
  }

  @keyframes dance {
    0%   { transform: translateY(0) rotate(-12deg); }
    25%  { transform: translateY(-14px) rotate(10deg); }
    50%  { transform: translateY(0) rotate(-8deg) scaleX(-1); }
    75%  { transform: translateY(-14px) rotate(10deg) scaleX(-1); }
    100% { transform: translateY(0) rotate(-12deg); }
  }

  .celebration p {
    color: #fff;
    margin: 10px 0 0;
    font-size: 16px;
  }
</style>
</head>
<body>

  <!-- floating cute stickers, scattered across the page -->
  <div id="stickers"></div>

  <div class="content">
    <h1>scuba cat 🤿✨</h1>
    <p class="subtitle"> 🕺🐈</p>

    <div class="game-wrap">
      <h2 class="section-title">tic tac toe 🎮</h2>
      <p class="game-status" id="gameStatus">your move! you're ❌</p>

      <div class="board" id="board"></div>

      <div class="celebration" id="celebration">
        <div class="dancer" id="dancerEmoji">🐱</div>
        <p id="celebrationText">you won! the cat is celebrating 🎉</p>
      </div>

      <div class="game-controls">
        <button class="game-btn" id="resetBtn">play again 🔄</button>
      </div>
    </div>

    <p class="caption">🐾 made with cuteness and chaos 🐾</p>

    <div class="divider">✨ 🐾 ✨ 🐾 ✨</div>

    <h2 class="section-title">the official sticker wall</h2>
    <p class="section-sub">tap one, it wiggles 🫧</p>
    <div class="sticker-wall" id="stickerWall"></div>

    <div class="quote-block">
      "it stank." 🐈‍⬛💧
      <span>— scuba cat, probably</span>
    </div>

    <div class="divider">🌸 💖 🌸 💖 🌸</div>

    <p class="footer">wesbite by aashu chaudhary🤿</p>
  </div>

<script>
  // a fun bag of cute sticker emojis
  const stickerEmojis = [
    "🐱","🐾","💖","✨","🌸","🐠","🫧","⭐","🦋","🍓",
    "🐰","☁️","🌈","💫","🐈","🧋","🍡","🪼","🐟","🎀",
    "🐹","🍥","🥥","🐳","🐬","🌟","🍒","🌺","🐥","💗",
    "🦄","🍩","🐢","🍉","🦢","🍭","🐞","🌙","🍑","🐧",
    "🦊","🍪","🐙","🌻","🐝","🍨","🐶","🪺","🐌","💐"
  ];

  // floating background stickers — spread across the *entire* scrollable page
  function scatterFloatingStickers() {
    const container = document.getElementById('stickers');
    container.innerHTML = '';
    const pageHeight = document.documentElement.scrollHeight;
    const stickerCount = 70;

    for (let i = 0; i < stickerCount; i++) {
      const el = document.createElement('div');
      el.className = 'sticker';
      el.textContent = stickerEmojis[Math.floor(Math.random() * stickerEmojis.length)];

      const top = Math.random() * pageHeight;        // px, across full page
      const left = Math.random() * 100;               // vw %
      const size = 16 + Math.random() * 30;            // px
      const rot = (Math.random() * 60 - 30).toFixed(1) + 'deg';
      const dur = (4 + Math.random() * 5).toFixed(2) + 's';
      const delay = (Math.random() * 5).toFixed(2) + 's';
      const opacity = 0.5 + Math.random() * 0.45;

      el.style.top = top + 'px';
      el.style.left = left + 'vw';
      el.style.fontSize = size + 'px';
      el.style.setProperty('--r', rot);
      el.style.animationDuration = dur;
      el.style.animationDelay = delay;
      el.style.opacity = opacity;

      container.appendChild(el);
    }
  }

  // interactive sticker wall grid
  function buildStickerWall() {
    const wall = document.getElementById('stickerWall');
    const wallCount = 24;
    for (let i = 0; i < wallCount; i++) {
      const tile = document.createElement('div');
      tile.className = 'sticker-tile';
      tile.textContent = stickerEmojis[Math.floor(Math.random() * stickerEmojis.length)];
      tile.addEventListener('click', () => {
        tile.textContent = stickerEmojis[Math.floor(Math.random() * stickerEmojis.length)];
      });
      wall.appendChild(tile);
    }
  }

  buildStickerWall();
  window.addEventListener('load', scatterFloatingStickers);
  scatterFloatingStickers();

  /* ================= TIC TAC TOE ================= */
  const HUMAN = 'X';
  const BOT = 'O';
  const WIN_LINES = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let cells = Array(9).fill(null);
  let gameOver = false;
  // roughly 1 in 2 games should end in a human win.
  // We pick the "fate" of this game up front:
  //  - "win"  -> bot plays weak/random moves, human likely wins
  //  - "lose" -> bot plays perfect/near-perfect, human likely loses or draws
  let gameFate = pickFate();

  function pickFate() {
    return Math.random() < 0.5 ? 'win' : 'lose';
  }

  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('gameStatus');
  const celebrationEl = document.getElementById('celebration');
  const dancerEl = document.getElementById('dancerEmoji');
  const celebrationTextEl = document.getElementById('celebrationText');
  const resetBtn = document.getElementById('resetBtn');

  const dancers = ['🐱','🐶'];
  const dancerCelebrationLines = [
    'you won! someone is celebrating 🎉',
    'gg! the dance floor is open 🕺',
    'victory dance unlocked ✨'
  ];

  function renderBoard() {
    boardEl.innerHTML = '';
    cells.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (val ? ' taken' : '');
      cell.textContent = val || '';
      cell.dataset.index = i;
      cell.addEventListener('click', () => handleHumanMove(i));
      boardEl.appendChild(cell);
    });
  }

  function getWinner(board) {
    for (const line of WIN_LINES) {
      const [a,b,c] = line;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line };
      }
    }
    if (board.every(c => c)) return { winner: 'draw', line: null };
    return null;
  }

  function emptyIndices(board) {
    return board.map((v,i) => v ? null : i).filter(v => v !== null);
  }

  // minimax for "perfect" bot play
  function minimax(board, player) {
    const result = getWinner(board);
    if (result) {
      if (result.winner === BOT) return { score: 1 };
      if (result.winner === HUMAN) return { score: -1 };
      return { score: 0 };
    }

    const moves = [];
    for (const idx of emptyIndices(board)) {
      const newBoard = board.slice();
      newBoard[idx] = player;
      const res = minimax(newBoard, player === BOT ? HUMAN : BOT);
      moves.push({ index: idx, score: res.score });
    }

    if (player === BOT) {
      return moves.reduce((best, m) => m.score > best.score ? m : best);
    } else {
      return moves.reduce((best, m) => m.score < best.score ? m : best);
    }
  }

  function botMove() {
    const empties = emptyIndices(cells);
    if (empties.length === 0) return;

    if (gameFate === 'lose') {
      // bot plays perfectly -> human can never win this round (win or draw only, for the bot)
      const best = minimax(cells, BOT);
      cells[best.index] = BOT;
    } else {
      // gameFate === 'win' -> bot NEVER blocks or takes a winning move,
      // guaranteeing the human wins this round. It still plays "normal-looking"
      // moves otherwise (prefers center/corners) so it doesn't look braindead.
      let movedIndex = null;

      const preferredOrder = [4, 0, 2, 6, 8, 1, 3, 5, 7];
      for (const idx of preferredOrder) {
        if (!cells[idx]) {
          // skip this square if taking it would win for the bot
          const copy = cells.slice();
          copy[idx] = BOT;
          const r = getWinner(copy);
          if (r && r.winner === BOT) continue;
          movedIndex = idx;
          break;
        }
      }
      if (movedIndex === null) {
        movedIndex = empties[Math.floor(Math.random() * empties.length)];
      }
      cells[movedIndex] = BOT;
    }
  }

  function findImmediateWin(board, player) {
    for (const idx of emptyIndices(board)) {
      const copy = board.slice();
      copy[idx] = player;
      const r = getWinner(copy);
      if (r && r.winner === player) return idx;
    }
    return null;
  }

  function handleHumanMove(i) {
    if (gameOver || cells[i]) return;
    cells[i] = HUMAN;
    renderBoard();

    let result = getWinner(cells);
    if (result) {
      endGame(result);
      return;
    }

    statusEl.textContent = "scuba cat is thinking... 🤔";
    setTimeout(() => {
      botMove();
      renderBoard();
      result = getWinner(cells);
      if (result) {
        endGame(result);
      } else {
        statusEl.textContent = "your move! you're ❌";
      }
    }, 450);
  }

  function highlightWinLine(line) {
    if (!line) return;
    const cellEls = boardEl.querySelectorAll('.cell');
    line.forEach(i => cellEls[i].classList.add('win'));
  }

  function endGame(result) {
    gameOver = true;
    if (result.winner === 'draw') {
      statusEl.textContent = "it's a draw! 🤝";
      return;
    }

    highlightWinLine(result.line);

    if (result.winner === HUMAN) {
      statusEl.textContent = "you won! 🏆";
      showCelebration();
    } else {
      statusEl.textContent = "scuba cat wins this round 🐾";
    }
  }

  function showCelebration() {
    const dancer = dancers[Math.floor(Math.random() * dancers.length)];
    const line = dancerCelebrationLines[Math.floor(Math.random() * dancerCelebrationLines.length)];
    dancerEl.textContent = dancer;
    celebrationTextEl.textContent = line;
    celebrationEl.classList.add('show');
  }

  function resetGame() {
    cells = Array(9).fill(null);
    gameOver = false;
    gameFate = pickFate();
    celebrationEl.classList.remove('show');
    statusEl.textContent = "your move! you're ❌";
    renderBoard();
  }

  resetBtn.addEventListener('click', resetGame);
  renderBoard();
</script>

</body>
</html>
